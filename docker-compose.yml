services:
  backend:
    build: ./backend
    image: ${BACKEND_IMAGE:-em-backend:1.0}
    container_name: em-backend
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s


  nginx:
    image: nginx:1.27-alpine
    container_name: em-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
